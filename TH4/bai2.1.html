<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="./assets/bai2.1.css">
</head>
<body>

<div class="wrapper">
    <div class="reg-container">
        <h2>Form Đăng Ký</h2>
        <form id="registerForm" novalidate>
            <div class="row">
                <label for="fullname">Họ và tên</label>
                <div class="field">
                    <div class="input-wrapper">
                        <input type="text" id="fullname" maxlength="50">
                        <span id="nameCount">0/50</span>
                    </div>
                    <small class="error" id="fullnameError"></small>
                </div>
            </div>

            <div class="row">
                <label for="email">Email</label>
                <div class="field">
                    <input type="email" id="email">
                    <small class="error" id="emailError"></small>
                </div>
            </div>

            <div class="row">
                <label for="phone">Số điện thoại</label>
                <div class="field">
                    <input type="text" id="phone">
                    <small class="error" id="phoneError"></small>
                </div>
            </div>

            <div class="row">
                <label for="password">Mật khẩu</label>
                <div class="field">
                    <div class="pass-input">
                        <input type="password" id="password">
                        <button type="button" id="togglePassword">👁</button>
                    </div>
                    <div class="strength-meter">
                        <div id="strengthBar"></div>
                    </div>
                    <div id="strengthText"></div>
                    <small class="error" id="passwordError"></small>
                </div>
            </div>

            <div class="row">
                <label for="confirmPassword">Xác nhận</label>
                <div class="field">
                    <input type="password" id="confirmPassword">
                    <small class="error" id="confirmPasswordError"></small>
                </div>
            </div>

            <div class="row">
                <label>Giới tính</label>
                <div class="field">
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Nam"> Nam</label>
                        <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                    </div>
                    <small class="error" id="genderError"></small>
                </div>
            </div>

            <div class="row">
                <label></label>
                <div class="field">
                    <label class="check-box">
                        <input type="checkbox" id="terms"> Tôi đồng ý điều khoản
                    </label>
                    <small class="error" id="termsError"></small>
                </div>
            </div>

            <div class="row">
                <label></label>
                <button type="submit" class="btn-submit">Đăng ký</button>
            </div>
        </form>
        <h3 id="successMessage" class="success"></h3>
    </div>
</div>

<script src="./assets/bai2.1.js"></script>
</body>
</html>
