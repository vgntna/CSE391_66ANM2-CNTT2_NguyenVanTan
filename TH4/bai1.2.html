<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="./assets/bai1.2.css">
</head>
<body>

<div class="container">
    <h2>Quản Lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="studentName" placeholder="Nhập họ tên...">
        <input type="number" id="studentScore" placeholder="Điểm (0-10)" min="0" max="10">
        <button onclick="addNewStudent()" class="btn-add">Thêm mới</button>
    </div>

    <div class="filter-controls">
        <input type="text" id="searchBox" placeholder="Tìm theo tên..." oninput="renderTable()">
        <select id="rankFilter" onchange="renderTable()">
            <option value="all">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi (≥ 8.0)</option>
            <option value="Khá">Khá (6.5 - 7.9)</option>
            <option value="Trung bình">Trung bình (5.0 - 6.4)</option>
            <option value="Yếu">Yếu (< 5.0)</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th style="cursor:pointer" onclick="toggleSort()">Điểm ⇅</th>
                <th>Xếp loại</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="dataTable">
            </tbody>
    </table>

    <div id="summaryStats" class="stats-box"></div>
</div>

<script src="./assets/bai1.2.js"></script>
</body>
</html>
