<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>
    <link rel="stylesheet" href="./assets/bai1.1.css">
</head>
<body>
    <h1 id="demo">Class Management</h1>

    <h2>Danh sách sinh viên</h2>

    <div class="input-group">
        <input id="name" type="text" placeholder="Họ tên">
        <input id="score" type="number" placeholder="Điểm" max="10" min="0">
        <button id="addBtn">Thêm sinh viên</button>
    </div>

    <br>

    <table>
        <thead>
            <tr>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <p id="stats"></p>

    <script src="./assets/bai1.1.js"></script>
</body>
</html>
